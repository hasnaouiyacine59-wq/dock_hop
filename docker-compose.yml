version: '3.3'

services:
  vpn-browser:
    build:
      context: .
      dockerfile: Dockerfile.unified
    container_name: vpn-browser
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    environment:
      - NORDVPN_TOKEN=${NORDVPN_TOKEN}
    ports:
      - "6080:6080"
    volumes:
      - camoufox-cache:/root/.cache/camoufox
    restart: unless-stopped

volumes:
  camoufox-cache:

